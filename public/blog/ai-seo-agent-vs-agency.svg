<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1110"/>
      <stop offset="100%" style="stop-color:#111A16"/>
    </linearGradient>
    <linearGradient id="cardLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141A17"/>
      <stop offset="100%" style="stop-color:#111510"/>
    </linearGradient>
    <linearGradient id="cardRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15181A"/>
      <stop offset="100%" style="stop-color:#121416"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2420" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Left card — AI Agent -->
  <rect x="55" y="140" width="490" height="350" rx="18" fill="url(#cardLeft)" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <!-- AI Agent glow -->
  <rect x="55" y="140" width="490" height="350" rx="18" fill="none" stroke="#22C55E" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Robot icon — left card -->
  <circle cx="170" cy="220" r="32" fill="#22C55E" fill-opacity="0.12" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="156" y="208" width="28" height="24" rx="4" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <circle cx="163" cy="217" r="3" fill="#22C55E"/>
  <circle cx="177" cy="217" r="3" fill="#22C55E"/>
  <line x1="163" y1="225" x2="177" y2="225" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="208" x2="160" y2="203" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="170" y1="208" x2="170" y2="201" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="180" y1="208" x2="180" y2="203" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>

  <text x="214" y="213" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#F5F2EE">AI SEO Agent</text>
  <text x="214" y="236" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#22C55E">Autonomous · Continuous · Governed</text>

  <!-- Left metrics -->
  <text x="90" y="285" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" font-weight="500">COST / MO</text>
  <text x="90" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#22C55E">$99–$299</text>

  <text x="310" y="285" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" font-weight="500">EXECUTION SPEED</text>
  <text x="310" y="308" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#22C55E">Minutes</text>

  <!-- Left feature list -->
  <text x="90" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94A3A0">✓  Continuous site-wide auditing</text>
  <text x="90" y="378" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94A3A0">✓  Schema + metadata updates</text>
  <text x="90" y="401" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94A3A0">✓  GEO &amp; AI citation tracking</text>
  <text x="90" y="424" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94A3A0">✓  Content refresh workflows</text>
  <text x="90" y="447" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94A3A0">✓  Approval-gated execution</text>

