  <rect x="200" y="295" width="370" height="130" rx="14" fill="#141A17" stroke="#2A3530" stroke-width="1"/>
  <rect x="200" y="295" width="6" height="130" rx="3" fill="#22C55E"/>
  <text x="222" y="322" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#22C55E" font-weight="600">SOURCE 1 · serpstrategists.com</text>
  <text x="222" y="343" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="600" fill="#F5F2EE">Perplexity SEO: 8 Ways to Get Cited</text>
  <text x="222" y="364" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#94A3A0">Structure content with clear headings, answer-</text>
  <text x="222" y="382" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#94A3A0">first paragraphs, and original data points...</text>
  <text x="222" y="405" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A">Updated July 2026</text>

  <rect x="590" y="295" width="370" height="130" rx="14" fill="#141A17" stroke="#2A3530" stroke-width="1"/>
  <rect x="590" y="295" width="6" height="130" rx="3" fill="#94A3A0" fill-opacity="0.4"/>
  <text x="612" y="322" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#6B8C7A" font-weight="600">SOURCE 2 · competitor.com</text>
  <text x="612" y="343" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="600" fill="#94A3A0">How AI Search Engines Work</text>
  <text x="612" y="364" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#6B8C7A">AI search engines like Perplexity use Bing's</text>
  <text x="612" y="382" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#6B8C7A">index to synthesize answers from sources...</text>
  <text x="612" y="405" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" fill-opacity="0.6">Updated Jan 2025</text>

  <!-- Stats bar -->
  <rect x="200" y="450" width="760" height="78" rx="14" fill="#141A17" stroke="#2A3530" stroke-width="1"/>
  <text x="260" y="480" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#22C55E" text-anchor="middle">100M+</text>
  <text x="260" y="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" text-anchor="middle">queries/month</text>
  <line x1="370" y1="460" x2="370" y2="515" stroke="#2A3530" stroke-width="1"/>
  <text x="500" y="480" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#22C55E" text-anchor="middle">30%+</text>
  <text x="500" y="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" text-anchor="middle">MoM growth</text>
  <line x1="630" y1="460" x2="630" y2="515" stroke="#2A3530" stroke-width="1"/>
  <text x="770" y="480" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#22C55E" text-anchor="middle">High CTR</text>
  <text x="770" y="500" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6B8C7A" text-anchor="middle">citations send real traffic</text>

  <!-- Header -->
  <text x="600" y="58" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="40" font-weight="800" fill="#F5F2EE" text-anchor="middle">How to Appear in Perplexity AI</text>
  <text x="600" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="17" fill="#6B8C7A" text-anchor="middle">8 Proven Citation Tactics for 2026 · serpstrategists.com</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0A0F0D"/>
  <text x="600" y="620" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#6B8C7A" text-anchor="middle">serpstrategists.com · Perplexity SEO Guide</text>

  <!-- Decorative -->
  <circle cx="80" cy="80" r="80" fill="#22C55E" fill-opacity="0.04"/>
  <circle cx="1120" cy="560" r="70" fill="#22C55E" fill-opacity="0.04"/>
</svg>
