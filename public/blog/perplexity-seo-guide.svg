<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1110"/>
      <stop offset="100%" style="stop-color:#0E1614"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#22C55E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <pattern id="grid2" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1A2420" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid2)" opacity="0.35"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="315" rx="300" ry="200" fill="url(#glowGrad)"/>

  <!-- Perplexity-style search bar mockup -->
  <rect x="200" y="195" width="800" height="72" rx="36" fill="#141A17" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="260" cy="231" r="20" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="1.2"/>
  <!-- Search icon -->
  <circle cx="258" cy="229" r="7" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="263" y1="234" x2="270" y2="241" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>

  <text x="298" y="224" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#6B8C7A">Ask anything...</text>
  <text x="298" y="245" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#F5F2EE">how to appear in perplexity search results</text>

