name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

concurrency:
  group: landing-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    runs-on: ubuntu-latest
    env:
      OPERATOR_API_URL: http://localhost:8000
      NEXT_PUBLIC_OPERATOR_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          tail -n 120 lint.log
          exit $code
      - name: Build
        run: npm run build
