name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

concurrency:
  group: landing-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    runs-on: ubuntu-latest
    env:
      OPERATOR_API_URL: http://localhost:8000
      NEXT_PUBLIC_OPERATOR_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Lint changed feature files
        id: lint
        shell: bash
        run: |
          set +e
          npx eslint app/actions/index.ts components/early-access-modal.tsx > lint.log 2>&1
          code=$?
          cat lint.log
          exit $code
      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: free-audit-lint-log
          path: lint.log
          retention-days: 3
      - name: Build
        run: npm run build
